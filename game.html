<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styler.css">
</head>
<body>
<center>
    <div>
        
        <div>
        <h1>Rock Paper Scissors</h1>

        </div>
        <div>
        <button onclick="playRound('rock')"
        class="move-button"><img src="images/rock-emoji.png" class="move-icon">
        </button>

        <button onclick="playRound('paper')"
        class="move-button"><img src="images/paper-emoji.png" class="move-icon">
        </button>

        <button onclick="playRound('scissors')"
        class="move-button"><img src="images/scissors-emoji.png" class="move-icon">
        </button>
        </div>

        <div>
        <p class="js-result"></p>
        <p class="js-move"></p>
        <p class="score-display score">Wins : 0 | Losses : 0 | Ties : 0</p>
        </div>

        <div>
        <button onclick=" resetScore() " class="reset-button">Reset Score</button>
        </div>
        
    </div>
</center>
<br><br><br>
<footer class="footer">
    <p>&copy; 2026 Rock Paper Scissors Game. All Rights Reserved. | Developed by Papon Ray</p>
</footer>
<script src="script.js"></script>

</body>
</html>
